services:
  netease-api:
    image: node:20-slim
    container_name: netease-api
    working_dir: /app
    volumes:
      - ../netease-api:/app
    command: npx NeteaseCloudMusicApi -p 3000
    ports:
      - "3000:3000"
    restart: unless-stopped

  claudio:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: claudio
    ports:
      - "8080:8080"
    volumes:
      - ../server/data:/app/server/data
    restart: unless-stopped
    depends_on:
      - netease-api
    environment:
      - NODE_ENV=production
      - PORT=8080
      - NETEASE_API_BASE=http://netease-api:3000
      - USE_MOCK_MUSIC=false
      - USE_MOCK_TTS=true
      - USE_MOCK_WEATHER=true
      - USE_MOCK_CALENDAR=true
      - USE_MOCK_UPNP=true
